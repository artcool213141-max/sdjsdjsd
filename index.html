<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FixStars Green Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        :root { 
            --bg-dark: #050a05; 
            --accent-green: #22c55e; 
            --deep-green: #14532d; 
            --glow-green: rgba(34, 197, 94, 0.2); 
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }

        body.loaded { opacity: 1; }

        /* Блокировщик ПК */
        #pc-only-blocker { display: none; position: fixed; inset: 0; background: #000; z-index: 999999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .qr-frame { background: white; padding: 15px; border-radius: 25px; box-shadow: 0 0 40px var(--accent-green); margin-bottom: 25px; }

        #stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        
        .main-wrapper { 
            background: radial-gradient(circle at 50% 30%, #064e3b 0%, #050a05 75%); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            z-index: 1; 
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 110px 24px;
            scrollbar-width: none;
        }
        .scrollable-content::-webkit-scrollbar { display: none; }
        
        /* Баланс */
        .balance-container-v2 { display: flex; flex-direction: column; gap: 4px; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(34, 197, 94, 0.3); padding: 10px 16px; border-radius: 20px; backdrop-filter: blur(20px); }
        .balance-item-v2 { display: flex; align-items: center; justify-content: flex-end; gap: 8px; cursor: pointer; }
        .balance-item-v2 img { width: 20px; height: 20px; object-fit: contain; filter: drop-shadow(0 0 5px var(--accent-green)); }
        
        /* Герой */
        .hero-zone { position: relative; animation: heroFloat 4s ease-in-out infinite; filter: drop-shadow(0 0 30px var(--glow-green)); text-align: center; margin: 25px 0; }
        @keyframes heroFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .hero-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; background: radial-gradient(circle, var(--glow-green) 0%, transparent 70%); z-index: -1; filter: blur(35px); }

        /* Кнопки меню */
        .game-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 24px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .game-card:active { transform: scale(0.96); background: rgba(34, 197, 94, 0.15); border-color: var(--accent-green); }
        .game-card img { width: 56px; height: 56px; object-fit: contain; filter: drop-shadow(0 0 12px rgba(34, 197, 94, 0.4)); }
        .card-title { font-weight: 900; font-style: italic; text-transform: uppercase; font-size: 17px; line-height: 1; letter-spacing: -0.5px; }
        .card-desc { font-size: 10px; font-weight: 700; color: var(--accent-green); text-transform: uppercase; opacity: 0.9; margin-top: 4px; }

        /* Навигация */
        .dock-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5, 10, 5, 0.96); border-top: 1px solid rgba(34, 197, 94, 0.2); display: flex; justify-content: space-around; padding: 12px 10px 34px 10px; z-index: 1000; backdrop-filter: blur(25px); height: 95px; }
        .dock-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #4b5563; flex: 1; }
        .dock-btn.active { color: var(--accent-green); filter: drop-shadow(0 0 8px var(--accent-green)); }
        
        #global-loader { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-ring { width: 50px; height: 50px; border: 3px solid #062006; border-left-color: var(--accent-green); border-radius: 50%; animation: rotate 1s linear infinite; }
        @keyframes rotate { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="loaded">

    <div id="pc-only-blocker">
        <div class="qr-frame"><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://t.me/FixStarsBot" alt="QR"></div>
        <h1 class="text-2xl font-black italic uppercase text-white">FIX <span class="text-green-500">STARS</span></h1>
    </div>

    <div id="global-loader">
        <div class="loader-ring"></div>
        <div class="mt-4 text-green-500 font-black italic tracking-widest animate-pulse">FIX STARS</div>
    </div>

    <canvas id="stars-canvas"></canvas>
    
    <div class="main-wrapper">
        <div class="scrollable-content">
            <!-- ШАПКА: ТОЛЬКО ПРОФИЛЬ И ЗВЕЗДЫ -->
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <img id="user-avatar" src="" class="w-14 h-14 rounded-2xl border-2 border-green-500/50 object-cover shadow-lg bg-gray-900">
                        <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-black rounded-full"></div>
                    </div>
                    <div>
                        <div id="display-name" class="text-[14px] font-black text-white tracking-wide uppercase italic">ЗАГРУЗКА...</div>
                        <div id="display-id" class="text-[10px] text-green-400 font-bold opacity-60">ID: 00000000</div>
                    </div>
                </div>
                <div class="balance-container-v2" onclick="tg.showAlert('Пополнение доступно в разделе STARS')">
                    <div class="balance-item-v2 text-green-400">
                        <span id="bal-stars" class="font-black text-xl">0</span>
                        <img src="star.png" alt="STAR">
                    </div>
                </div>
            </div>

            <!-- ГЕРОЙ -->
            <div class="hero-zone">
                <div class="hero-glow"></div>
                <img src="hero.png" alt="HERO" class="w-44 h-44 mx-auto object-contain">
                <h1 class="text-5xl font-black italic mt-2 uppercase tracking-tighter">Fix<span class="text-green-500">Stars</span></h1>
                <div class="h-1.5 w-16 bg-green-500 rounded-full mx-auto mt-2 shadow-lg shadow-green-500/50"></div>
            </div>

            <!-- МЕНЮ -->
            <div class="mt-10">
                <div onclick="navigateTo('case.html')" class="game-card">
                    <img src="pepe.png" alt="Cases">
                    <div>
                        <div class="card-title">Задания</div>
                        <div class="card-desc">Выполняй простые задания и зарабатывай Stars</div>
                    </div>
                    <div class="ml-auto opacity-30"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg></div>
                </div>

                <div onclick="navigateTo('wheel.html')" class="game-card">
                    <img src="spin.png" alt="Wheel">
                    <div>
                        <div class="card-title">Колесо удачи</div>
                        <div class="card-desc">Испытай свою удачу</div>
                    </div>
                    <div class="ml-auto"><div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div></div>
                </div>

                <div onclick="navigateTo('games.html')" class="game-card">
                    <img src="mini.png" alt="Games">
                    <div>
                        <div class="card-title">Мини-игры</div>
                        <div class="card-desc">Играй и зарабатывай</div>
                    </div>
                    <div class="ml-auto opacity-30"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg></div>
                </div>
            </div>
        </div>

        <!-- ТУЛБАР: УБРАН ДЕПОЗИТ (КОШЕЛЕК) -->
        <div class="dock-bar">
            <div class="dock-btn active">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011-1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                <span class="text-[10px] font-black uppercase italic">Главная</span>
            </div>
            <div onclick="navigateTo('profile.html')" class="dock-btn">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[10px] font-black uppercase italic">Профиль</span>
            </div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const BACKEND_URL = 'https://sdjsdjsd.vercel.app';
    const user = tg.initDataUnsafe?.user;

async function syncData() {
    if (!user) return;
    try {
        // Получаем имя пользователя из Telegram (username или имя+фамилия)
        const username = user.username || `${user.first_name || ''} ${user.last_name || ''}`.trim() || "Player";

        // Запрос к API с передачей username для сохранения в базе
        const res = await fetch(`${BACKEND_URL}/get_balance/${user.id}?username=${encodeURIComponent(username)}&t=${Date.now()}`);
        
        if (!res.ok) throw new Error("Ошибка сервера");
        
        const data = await res.json();
        
        // Берем баланс из ответа (колонку 'balance')
        const starsVal = data.balance !== undefined ? data.balance : 0; 
        
        // Обновляем число в интерфейсе бота
        const starsElem = document.getElementById('bal-stars');
        if (starsElem) {
            starsElem.innerText = Math.floor(starsVal);
        }
        
        console.log("Данные синхронизированы. Игрок:", username, "Баланс:", starsVal);
    } catch (e) { 
        console.warn("Не удалось обновить баланс:", e); 
    }
}

window.onload = () => {
    tg.expand();
    tg.ready();
    // Красим хедер Telegram в цвет твоего нового дизайна
    tg.headerColor = '#050a05';
    tg.backgroundColor = '#050a05';
    
    if (user) {
        document.getElementById('display-name').innerText = (user.username || user.first_name || "PLAYER").toUpperCase();
        document.getElementById('display-id').innerText = `ID: ${user.id}`;
        // Ставим аватарку, если её нет — генерим зеленую иконку с инициалами
        document.getElementById('user-avatar').src = user.photo_url || `https://ui-avatars.com/api/?background=14532d&color=fff&name=${user.first_name}`;
        
        // Запускаем синхронизацию с базой
        syncData();
    }
    
    // Убираем лоадер через 800мс
    setTimeout(() => {
        document.getElementById('global-loader').style.display = 'none';
        document.body.classList.add('loaded');
    }, 800);
};

    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let starsArr = [];
    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        starsArr = Array.from({length: 40}, () => ({ 
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height, 
            size: Math.random() * 2, 
            speed: Math.random() * 0.5 + 0.1, 
            opacity: Math.random() 
        }));
    }
    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        starsArr.forEach(s => {
            ctx.beginPath(); ctx.globalAlpha = s.opacity; ctx.fillStyle = "#22c55e"; 
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
            s.y += s.speed; if (s.y > canvas.height) s.y = -5;
        });
        requestAnimationFrame(animateStars);
    }
    initStars(); animateStars();
</script>
</body>
</html>
